<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oathbound Next Shows</title>
    <meta name="description" content="The next Oathbound tour dates.">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body data-page="upcoming" data-root=".." data-show-limit="3" data-show-directions="false" data-widget="compact">
    <main class="widget-main">
      <section class="shows-shell widget-shell" aria-label="Upcoming Oathbound shows">
        <p id="show-count" class="widget-count" aria-live="polite"></p>
        <div id="shows-list" class="shows-list" aria-live="polite"></div>
        <div class="widget-footer" hidden>
          <a class="button button--primary widget-all-link" href="https://tour.oathboundband.com" target="_blank" rel="noopener noreferrer">View All Shows</a>
        </div>
      </section>
    </main>

    <template id="show-card-template">
      <article class="show-card">
        <time class="show-date">
          <span class="show-month"></span>
          <span class="show-day"></span>
          <span class="show-year"></span>
        </time>
        <div class="show-details">
          <p class="show-status"></p>
          <div class="show-flags"></div>
          <div class="show-title-row">
            <div>
              <h3 class="show-venue"></h3>
              <p class="show-location"></p>
            </div>
            <div class="show-age"></div>
          </div>
          <p class="show-time"></p>
          <p class="show-lineup"></p>
          <p class="show-notes"></p>
        </div>
        <div class="show-actions"></div>
      </article>
    </template>

    <script src="../script.js" defer></script>
  </body>
</html>
